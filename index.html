<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الرقابة الشامل - الإصدار النهائي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        
        /* تصميم الطباعة الحراري */
        #thermalArea { display: none; width: 80mm; background: white; padding: 0; margin: 0; color: black; }
        .receipt-table { width: 100%; border-collapse: collapse; margin-top: 4px; border: 1.5px solid #000; }
        .receipt-table th, .receipt-table td { border: 1.5px solid #000; padding: 3px; text-align: center; font-size: 11px; font-weight: bold; }
        .print-header { display: flex; align-items: center; justify-content: center; gap: 12px; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 8px; }
        .header-logo-img { width: 55px; height: 55px; object-fit: contain; border-radius: 50%; }

        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: #f1f5f9; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }

        /* نافذة المودل (التفاصيل) */
        #detailsModal { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); 
            z-index: 50; display: none; align-items: center; justify-content: center; 
            padding: 20px; backdrop-filter: blur(8px);
        }
        #modalContent { 
            max-width: 1100px; width: 100%; max-height: 90vh; 
            overflow-y: auto; background: white; border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media print {
            @page { size: 80mm auto; margin: 0; }
            body * { visibility: hidden; }
            #thermalArea, #thermalArea * { visibility: visible; }
            #thermalArea { display: block !important; position: absolute; left: 0; top: 0; width: 80mm; padding: 3mm; }
        }

        .checkbox-custom { width: 22px; height: 22px; cursor: pointer; accent-color: #2563eb; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 pb-32">

    <!-- شاشة تسجيل الدخول -->
    <div id="loginOverlay">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-slate-200">
            <img src="https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0" 
                 class="w-24 h-24 mx-auto mb-6 rounded-full border-4 border-blue-50 shadow-lg object-cover">
            <h2 class="text-3xl font-black text-slate-800 mb-2">بوابة الرقابة</h2>
            <p class="text-slate-400 font-bold text-[10px] mb-8 uppercase italic italic tracking-widest">مركز التحكم والمراجعة</p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="loginCode" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-bold text-center focus:border-blue-600" placeholder="الكود التعريفي">
                <input type="password" id="loginPass" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-bold text-center focus:border-blue-600" placeholder="كلمة المرور">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 transition-all shadow-xl active:scale-95">دخول النظام</button>
            </form>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="mainContent" class="hidden max-w-7xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <img src="https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                <div>
                    <h1 id="sysTitle" class="text-2xl font-black text-slate-800 tracking-tight">لوحة التحكم</h1>
                    <p class="text-slate-500 font-bold text-xs uppercase italic">مرحباً: <span id="userNameDisplay" class="text-blue-600 font-black">---</span></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black shadow-lg hover:bg-blue-700 active:scale-95">🔄 تحديث البيانات</button>
                <button onclick="logout()" class="bg-white text-red-500 border border-red-100 px-4 py-3 rounded-2xl font-black hover:bg-red-50">خروج</button>
            </div>
        </header>

        <!-- كروت الإحصائيات -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-right">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-blue-600">
                <span class="text-slate-400 text-[10px] font-black uppercase">إجمالي الكاش</span>
                <h2 id="stCash" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-emerald-500">
                <span class="text-slate-400 text-[10px] font-black uppercase">انستا باي</span>
                <h2 id="stInsta" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-orange-500">
                <span class="text-slate-400 text-[10px] font-black uppercase">الفيزا</span>
                <h2 id="stVisa" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-purple-500">
                <span class="text-slate-400 text-[10px] font-black uppercase">المحافظ</span>
                <h2 id="stWallet" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
        </div>

        <!-- فلاتر البحث -->
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 flex flex-wrap gap-4 items-end border border-slate-100 text-right">
            <div class="flex-1 min-w-[250px]">
                <label class="block text-[10px] font-black text-slate-500 mb-1 italic uppercase">اختيار الفرع</label>
                <div class="relative">
                    <select id="fBranch" onchange="applyFilters()" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-black disabled:bg-slate-200">
                        <option value="">جميع الفروع</option>
                    </select>
                    <div id="lockIcon" class="hidden absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔒 مقفل</div>
                </div>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-[10px] font-black text-slate-500 mb-1 italic uppercase">التاريخ</label>
                <input type="date" id="fDate" onchange="applyFilters()" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-black text-center">
            </div>
            <div class="w-32">
                <label class="block text-[10px] font-black text-slate-500 mb-1 italic uppercase">الدرج</label>
                <input type="number" id="fDrawer" placeholder="0" onkeyup="if(event.key==='Enter') applyFilters()" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-black text-center">
            </div>
        </div>

        <!-- الجدول الرئيسي -->
        <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100 mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-black border-b border-slate-100 uppercase italic">
                        <tr>
                            <th class="p-6 text-center"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" class="checkbox-custom"></th>
                            <th class="p-6">الفرع</th>
                            <th class="p-6">التاريخ</th>
                            <th class="p-6 text-center">الدرج</th>
                            <th class="p-6">النقدي</th>
                            <th class="p-6 text-blue-600">المستحق</th>
                            <th class="p-6 text-center">الفرق</th>
                            <th class="p-6 text-center">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="mainTableBody" class="divide-y divide-slate-50 font-bold text-slate-700 italic"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودل التفاصيل العميقة -->
    <div id="detailsModal" onclick="if(event.target.id === 'detailsModal') closeDetails()">
        <div id="modalContent" class="p-10 animate-in fade-in zoom-in duration-300 custom-scrollbar">
            <div class="flex justify-between items-center mb-8 border-b pb-6">
                <div class="text-right">
                    <h3 class="text-3xl font-black text-slate-800 tracking-tighter italic">تفاصيل الخزينة الكاملة</h3>
                    <p id="modalSubTitle" class="text-xs font-bold text-blue-500 mt-2 uppercase"></p>
                </div>
                <button onclick="closeDetails()" class="bg-red-50 text-red-500 w-12 h-12 rounded-full font-black text-xl hover:bg-red-100">✕</button>
            </div>
            
            <div id="modalBody" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-10 text-right"></div>

            <div class="bg-slate-900 text-white p-8 rounded-[2rem] flex flex-wrap justify-between items-center gap-6 shadow-2xl">
                <div class="flex gap-10">
                    <div class="text-right">
                        <span class="text-[10px] font-black text-slate-400 block uppercase italic">الإجمالي المستحق</span>
                        <h4 id="modalTotalVal" class="text-4xl font-black tracking-tighter">0</h4>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-slate-400 block uppercase italic">الفرق النهائي</span>
                        <h4 id="modalDiffVal" class="text-4xl font-black tracking-tighter">0</h4>
                    </div>
                </div>
                <button id="modalPrintBtn" class="bg-blue-600 text-white px-12 py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-500 transition-all active:scale-95">طبع إيصال حراري 🖨️</button>
            </div>
        </div>
    </div>

    <!-- شريط الإجراءات المجمعة -->
    <div id="bulkActions" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex items-center gap-8 z-40 border-t border-white/10">
        <span id="selectedCount" class="text-sm font-black text-blue-400 px-2 italic uppercase">0 مختارة</span>
        <button onclick="generateDailyReport()" class="bg-blue-600 px-12 py-4 rounded-2xl text-xs font-black hover:bg-blue-500 transition-all shadow-lg active:scale-95">🖨️ طباعة تقرير مجمع للفروع</button>
    </div>

    <!-- منطقة الطباعة -->
    <div id="thermalArea"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logoUrl = "https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0";

    let allRecords = [];
    let currentUser = null;

    window.onload = () => {
        const saved = sessionStorage.getItem('audit_secure_v6');
        if (saved) { currentUser = JSON.parse(saved); startApp(); }
        document.getElementById('loginForm').onsubmit = handleLogin;
    };

    async function handleLogin(e) {
        e.preventDefault();
        const code = document.getElementById('loginCode').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        
        try {
            const snap = await db.ref("branches").once("value");
            let found = null;
            snap.forEach(c => {
                const b = c.val();
                if(String(b.code).trim() === code && String(b.password).trim() === pass) {
                    found = { 
                        name: String(b.name).trim(), 
                        type: String(b.type || "فرع").trim() 
                    };
                }
            });

            if(found) { 
                currentUser = found; 
                sessionStorage.setItem('audit_secure_v6', JSON.stringify(found)); 
                startApp(); 
            } else { alert("بيانات الدخول خاطئة"); }
        } catch(err) { alert("خطأ في الاتصال بالسيرفر"); }
    }

    function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        
        const branchSelect = document.getElementById('fBranch');
        const lockIcon = document.getElementById('lockIcon');
        const sysTitle = document.getElementById('sysTitle');

        if (currentUser.type === "مراجع") {
            branchSelect.disabled = false;
            lockIcon.classList.add('hidden');
            sysTitle.innerText = "مركز التحكم والمراجعة";
        } else {
            branchSelect.innerHTML = `<option value="${currentUser.name}">${currentUser.name}</option>`;
            branchSelect.value = currentUser.name;
            branchSelect.disabled = true;
            lockIcon.classList.remove('hidden');
            sysTitle.innerText = `نظام الفرع: ${currentUser.name}`;
        }
        
        fetchData();
    }

    function logout() { sessionStorage.removeItem('audit_secure_v6'); location.reload(); }

    function sum(arr) { 
        if(!arr || !Array.isArray(arr)) return 0; 
        return arr.reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0); 
    }

    function fetchData() {
        const body = document.getElementById("mainTableBody");
        body.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-300 font-bold italic animate-pulse tracking-widest">جاري سحب بيانات الخزينة...</td></tr>`;

        db.ref("treasury").once("value", s => {
            allRecords = [];
            const dynamicBranches = new Set();
            
            s.forEach(c => {
                const item = c.val(); 
                item.key = c.key;
                const bName = (item.branchName || "").trim();

                if (currentUser.type === "مراجع") {
                    allRecords.push(item);
                    if(bName) dynamicBranches.add(bName);
                } else {
                    if (bName === currentUser.name) allRecords.push(item);
                }
            });

            if (currentUser.type === "مراجع") {
                const sel = document.getElementById("fBranch");
                const current = sel.value;
                sel.innerHTML = `<option value="">كل الفروع المتوفرة</option>`;
                Array.from(dynamicBranches).sort().forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
                sel.value = current;
            }
            applyFilters();
        });
    }

    function applyFilters() {
        const bV = document.getElementById("fBranch").value;
        const dV = document.getElementById("fDate").value;
        const drV = document.getElementById("fDrawer").value;

        const filtered = allRecords.filter(r => {
            const rN = (r.branchName || "").trim();
            if (currentUser.type !== "مراجع" && rN !== currentUser.name) return false;
            if (bV && rN !== bV) return false;
            if (dV && r.date !== dV) return false;
            if (drV && r.drawer != drV) return false;
            return true;
        });
        renderTable(filtered);
    }

    function renderTable(data) {
        const body = document.getElementById("mainTableBody");
        body.innerHTML = "";
        data.sort((x, y) => (y.timestamp||0) - (x.timestamp||0));

        let tC=0, tI=0, tW=0, tV=0;
        data.forEach(item => {
            tC+=(+item.cash||0); tI+=sum(item.insta); tW+=sum(item.wallet); tV+=sum(item.visa);

            const tr = document.createElement("tr");
            tr.className = "hover:bg-blue-50 transition-all cursor-pointer group";
            tr.onclick = (e) => { if(e.target.type !== 'checkbox' && e.target.tagName !== 'BUTTON') showDetailsModal(item); };
            tr.innerHTML = `
                <td class="p-6 text-center"><input type="checkbox" value="${item.key}" onchange="updateSelectedCount()" class="row-check checkbox-custom"></td>
                <td class="p-6 font-black text-slate-900">${item.branchName}</td>
                <td class="p-6 text-slate-400 font-bold text-[11px] italic">${item.date}</td>
                <td class="p-6 text-center text-slate-900 font-black">${item.drawer || '1'}</td>
                <td class="p-6 text-emerald-600 font-black">${(+item.cash||0).toLocaleString()}</td>
                <td class="p-6 font-black">${(+item.total||0).toLocaleString()}</td>
                <td class="p-6 text-center">
                    <span class="px-4 py-1.5 rounded-xl text-[10px] font-black italic ${+item.diff < 0 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                        ${item.diff}
                    </span>
                </td>
                <td class="p-6 text-center">
                    <button onclick='printSingle(${JSON.stringify(item)})' class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black hover:bg-blue-600">طبع 🖨️</button>
                </td>
            `;
            body.appendChild(tr);
        });

        document.getElementById("stCash").innerText = tC.toLocaleString();
        document.getElementById("stInsta").innerText = tI.toLocaleString();
        document.getElementById("stVisa").innerText = tV.toLocaleString();
        document.getElementById("stWallet").innerText = tW.toLocaleString();
    }

    function showDetailsModal(item) {
        const modal = document.getElementById("detailsModal");
        const body = document.getElementById("modalBody");
        document.getElementById("modalSubTitle").innerText = `${item.branchName} | درج ${item.drawer} | تاريخ ${item.date}`;
        
        body.innerHTML = `
            ${renderSubTableHTML("انستا باي", item.insta, 'trans')}
            ${renderSubTableHTML("المحافظ", item.wallet, 'trans')}
            ${renderSubTableHTML("فيزا مبيعات", item.visa, 'visa')}
            ${renderSubTableHTML("المشتريات", item.purchases, 'exp')}
            ${renderSubTableHTML("المصروفات", item.expenses, 'exp')}
            <div class="bg-blue-50/50 p-8 rounded-[2.5rem] flex flex-col justify-center items-center border-2 border-blue-100 italic">
                <span class="text-[10px] font-black text-blue-400 uppercase">إجمالي النقدية</span>
                <h4 class="text-4xl font-black text-blue-900 mt-4 tracking-tighter">${(+item.cash||0).toLocaleString()}</h4>
            </div>
        `;

        document.getElementById("modalTotalVal").innerText = (+item.total||0).toLocaleString();
        const diffEl = document.getElementById("modalDiffVal");
        diffEl.innerText = item.diff;
        diffEl.className = `text-4xl font-black tracking-tighter ${+item.diff < 0 ? 'text-red-500' : 'text-green-500'}`;

        document.getElementById("modalPrintBtn").onclick = () => printSingle(item);
        modal.style.display = "flex";
        document.body.style.overflow = "hidden";
    }

    function closeDetails() {
        document.getElementById("detailsModal").style.display = "none";
        document.body.style.overflow = "auto";
    }

    function renderSubTableHTML(title, arr, type) {
        if(!arr || arr.length === 0) return `<div class="bg-slate-50 p-8 rounded-[2rem] text-center text-slate-300 font-bold border-2 border-dashed border-slate-100 text-[10px] uppercase italic">${title}: فارغ</div>`;
        let h = `<div class="bg-white border rounded-[2rem] overflow-hidden shadow-sm">
            <div class="bg-slate-900 text-white p-3 text-[10px] font-black text-center uppercase tracking-tighter italic">${title}</div>
            <table class="w-full text-[11px] text-right italic"><tbody>`;
        arr.forEach(x => {
            h += `<tr class="border-b">`;
            if(type==='visa') h += `<td class="p-3 text-slate-400 font-bold">${x.batch}</td><td class="p-3 font-black">${x.amount}</td><td class="p-3 text-blue-500 font-black">x${x.count}</td>`;
            else if(type==='trans') h += `<td class="p-3 text-emerald-600 font-black">${x.amount}</td><td class="p-3 text-slate-400 text-[9px]">${x.mobile||''}</td><td class="p-3 font-black">${x.name||''}</td>`;
            else h += `<td class="p-3 text-red-500 font-black">${x.amount}</td><td class="p-3 text-slate-500">${x.note||''}</td>`;
            h += `</tr>`;
        });
        h += `<tr class="bg-slate-50 font-black"><td class="p-4 text-[10px]">المجموع</td><td colspan="2" class="p-4 text-left text-blue-600 font-black">${sum(arr).toLocaleString()}</td></tr>`;
        h += `</tbody></table></div>`;
        return h;
    }

    function toggleSelectAll(master) { document.querySelectorAll(".row-check").forEach(c => c.checked = master.checked); updateSelectedCount(); }

    function updateSelectedCount() {
        const count = document.querySelectorAll(".row-check:checked").length;
        const bulk = document.getElementById("bulkActions");
        if(count > 0) bulk.classList.remove("hidden"); else bulk.classList.add("hidden");
        document.getElementById("selectedCount").innerText = `${count} سجلات مختارة`;
    }

    function generateDailyReport() {
        const selectedKeys = Array.from(document.querySelectorAll(".row-check:checked")).map(c => c.value);
        const selectedData = allRecords.filter(r => selectedKeys.includes(r.key));
        if(selectedData.length === 0) return;

        let agg = { cash: 0, actual: 0, total: 0, diff: 0, insta: [], wallet: [], visa: [], purchases: [], expenses: [], branchNames: new Set(), date: selectedData[0].date, day: selectedData[0].day };
        selectedData.forEach(d => {
            agg.cash += (+d.cash||0); agg.actual += (+d.actual||0); agg.total += (+d.total||0); agg.diff += (+d.diff||0);
            if(d.insta) agg.insta.push(...d.insta); if(d.wallet) agg.wallet.push(...d.wallet);
            if(d.visa) agg.visa.push(...d.visa); if(d.purchases) agg.purchases.push(...d.purchases);
            if(d.expenses) agg.expenses.push(...d.expenses); agg.branchNames.add(d.branchName);
        });
        printThermal(agg, true);
    }

    function printSingle(d) { printThermal(d, false); }

    function printThermal(d, isAgg) {
        const area = document.getElementById("thermalArea");
        const bTitle = isAgg ? Array.from(d.branchNames).join(" + ") : d.branchName;
        area.innerHTML = `
            <div class="print-header">
                <img src="${logoUrl}" class="header-logo-img">
                <div style="text-align:right; flex:1;">
                    <h2 style="font-size:16px; font-weight:900; margin:0;">${bTitle}</h2>
                    <div style="font-size:10px; font-weight:bold;">تقرير مراجعة الخزينة ${isAgg ? '(مجمع)' : ''}</div>
                </div>
            </div>
            <table class="receipt-table" style="margin-bottom:8px; border:none;">
                <tr style="border:none;">
                    <td style="border:1.5px solid #000;">${d.day || '---'}</td>
                    <td style="border:1.5px solid #000;">${d.date}</td>
                    <td style="border:1.5px solid #000;">درج: ${isAgg ? 'متعدد' : (d.drawer||'1')}</td>
                </tr>
            </table>
            <table class="receipt-table">
                <tr style="background:#eee"><th>البيان</th><th>القيمة</th></tr>
                <tr><td>النقدية المستلمة</td><td>${(+d.cash||0).toLocaleString()}</td></tr>
                <tr><td>انستا باي</td><td>${sum(d.insta).toLocaleString()}</td></tr>
                <tr><td>المحافظ</td><td>${sum(d.wallet).toLocaleString()}</td></tr>
                <tr><td>فيزا مبيعات</td><td>${sum(d.visa).toLocaleString()}</td></tr>
                <tr style="background:#f9f9f9; font-weight:900;"><td>المجموع المستحق</td><td>${(+d.total||0).toLocaleString()}</td></tr>
                <tr style="background:#f0f0f0; font-size:14px; font-weight:900;"><td>الفعلي POS</td><td>${(+d.actual||0).toLocaleString()}</td></tr>
                <tr style="color:${+d.diff < 0 ? 'red' : 'black'}"><td>صافي الفرق</td><td>${d.diff}</td></tr>
            </table>
            ${renderSubTablePrint("انستا باي", d.insta, 'trans')}
            ${renderSubTablePrint("المحافظ", d.wallet, 'trans')}
            ${renderSubTablePrint("المصاريف والمشتريات", [...(d.purchases||[]), ...(d.expenses||[])], 'exp')}
            <div style="text-align:center; font-size:9px; margin-top:12px; border-top:1px dashed #ccc; padding-top:4px; font-style:italic;">
                بواسطة: ${currentUser.name} | طبع في: ${new Date().toLocaleString('ar-EG')}
            </div>
        `;
        setTimeout(() => { window.print(); }, 300);
    }

    function renderSubTablePrint(title, arr, type) {
        if(!arr || arr.length === 0) return "";
        let h = `<div style="text-align:center; font-weight:900; margin-top:10px; border-top:1px dashed #000; padding-top:4px; font-size:10px;">-- ${title} --</div>`;
        h += `<table class="receipt-table"><thead><tr>`;
        if(type==='trans') h += `<th>مبلغ</th><th>الرقم</th><th>الاسم</th>`;
        else h += `<th>مبلغ</th><th>البيان</th>`;
        h += `</tr></thead><tbody>`;
        arr.forEach(x => {
            h += `<tr>`;
            if(type==='trans') h += `<td>${x.amount}</td><td>${x.mobile||''}</td><td>${x.name||''}</td>`;
            else h += `<td>${x.amount}</td><td>${x.note||''}</td>`;
            h += `</tr>`;
        });
        h += `</tbody></table>`;
        return h;
    }
</script>
</body>
</html>
