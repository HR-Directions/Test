<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الرقابة - ذكاء الطباعة المدمجة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* تصميم الطباعة الحراري الاحترافي */
        #thermalArea { display: none; width: 80mm; background: white; padding: 0; margin: 0; color: black; }
        .receipt-table { width: 100%; border-collapse: collapse; margin-top: 4px; border: 1.5px solid #000; }
        .receipt-table th, .receipt-table td { border: 1.5px solid #000; padding: 3px; text-align: center; font-size: 11px; font-weight: bold; }
        .print-header { display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 8px; }
        .header-logo-img { width: 55px; height: 55px; object-fit: contain; }

        .checkbox-custom { width: 22px; height: 22px; cursor: pointer; accent-color: #2563eb; }
        #detailsModal { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
            z-index: 100; display: none; align-items: center; justify-content: center; 
            padding: 15px; backdrop-filter: blur(5px);
        }
        #modalContent { 
            max-width: 1000px; width: 100%; max-height: 90vh; 
            overflow-y: auto; background: white; border-radius: 2rem;
        }

        @media print {
            @page { size: 80mm auto; margin: 0; }
            body * { visibility: hidden; }
            #thermalArea, #thermalArea * { visibility: visible; }
            #thermalArea { display: block !important; position: absolute; left: 0; top: 0; width: 80mm; padding: 3mm; }
        }
    </style>
</head>
<body class="p-4 md:p-6 pb-32 text-right">

    <!-- Login Screen -->
    <div id="loginOverlay" class="fixed inset-0 bg-slate-100 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border border-slate-200">
            <img src="https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0" 
                 class="w-20 h-20 mx-auto mb-4 rounded-full shadow-md object-cover">
            <h2 class="text-2xl font-black text-slate-800 mb-1">بوابة الرقابة الموحدة</h2>
            <p class="text-slate-400 font-bold text-[10px] mb-6 uppercase italic tracking-widest">نظام المراجعة المالية الذكي</p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="loginCode" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-bold text-center focus:border-blue-600" placeholder="كود المستخدم">
                <input type="password" id="loginPass" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-bold text-center focus:border-blue-600" placeholder="كلمة المرور">
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-600 transition-all">تأكيد الدخول</button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden max-w-7xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-white rounded-2xl shadow-sm border">
                    <img src="https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0" class="w-12 h-12 rounded-xl object-cover">
                </div>
                <div>
                    <h1 id="sysTitle" class="text-2xl font-black text-slate-800 tracking-tight">لوحة الرقابة</h1>
                    <p class="text-slate-500 font-bold text-[10px] uppercase italic">المستخدم الحالي: <span id="userNameDisplay" class="text-blue-600">---</span></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:bg-blue-700 active:scale-95 transition-all">تحديث البيانات</button>
                <button onclick="logout()" class="bg-white text-red-500 border border-red-100 px-4 py-3 rounded-2xl font-black hover:bg-red-50">خروج</button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-right font-bold">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-blue-600">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-[10px] font-black uppercase italic">إجمالي الكاش</span>
                    <span id="stCashCount" class="bg-blue-50 text-blue-600 text-[9px] px-2 py-0.5 rounded-full">0 جرد</span>
                </div>
                <h2 id="stCash" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-emerald-500">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-[10px] font-black uppercase italic">انستا باي</span>
                    <span id="stInstaCount" class="bg-emerald-50 text-emerald-600 text-[9px] px-2 py-0.5 rounded-full">0 ع</span>
                </div>
                <h2 id="stInsta" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-orange-500">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-[10px] font-black uppercase italic">الفيزا</span>
                    <span id="stVisaCount" class="bg-orange-50 text-orange-500 text-[9px] px-2 py-0.5 rounded-full">0 ع</span>
                </div>
                <h2 id="stVisa" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-purple-500">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-[10px] font-black uppercase italic">المحافظ</span>
                    <span id="stWalletCount" class="bg-purple-50 text-purple-600 text-[9px] px-2 py-0.5 rounded-full">0 ع</span>
                </div>
                <h2 id="stWallet" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
        </div>

        <!-- Filters Section -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-6 flex flex-wrap gap-4 items-end border border-slate-100">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase">اختيار الفرع</label>
                <div class="relative">
                    <select id="fBranch" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-black text-slate-700 disabled:bg-slate-200 appearance-none">
                        <option value="">كل الفروع</option>
                    </select>
                    <div id="lockIcon" class="hidden absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">🔒 مقفل</div>
                </div>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase">التاريخ</label>
                <input type="date" id="fDate" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-black text-center">
            </div>
            <div class="w-32">
                <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase">رقم الدرج</label>
                <input type="number" id="fDrawer" placeholder="0" onkeyup="if(event.key==='Enter') applyFilters()" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-black text-center">
            </div>
        </div>

        <!-- Main Table -->
        <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full text-right">
                <thead class="bg-slate-50 text-slate-400 text-[10px] font-black border-b border-slate-100 uppercase italic">
                    <tr>
                        <th class="p-6 text-center"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" class="checkbox-custom"></th>
                        <th class="p-6">الفرع</th>
                        <th class="p-6">التاريخ</th>
                        <th class="p-6 text-center">الدرج</th>
                        <th class="p-6">النقدي</th>
                        <th class="p-6">الإجمالي</th>
                        <th class="p-6 text-center">الفرق</th>
                        <th class="p-6 text-center">إجراء</th>
                    </tr>
                </thead>
                <tbody id="mainTableBody" class="divide-y divide-slate-50 font-bold text-slate-700 italic"></tbody>
            </table>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" onclick="if(event.target.id === 'detailsModal') closeDetails()">
        <div id="modalContent" class="p-8 animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div class="text-right">
                    <h3 class="text-3xl font-black text-slate-800 italic">المعاينة التفصيلية</h3>
                    <p id="modalSubTitle" class="text-[10px] font-bold text-blue-500 uppercase mt-1"></p>
                </div>
                <button onclick="closeDetails()" class="bg-red-50 text-red-500 w-12 h-12 rounded-full font-black text-xl hover:bg-red-100 transition-all">✕</button>
            </div>
            <div id="modalBody" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8 text-right"></div>
            <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] flex flex-wrap justify-between items-center gap-4 shadow-2xl">
                <div class="flex gap-12">
                    <div>
                        <span class="text-[10px] font-black text-slate-400 block uppercase italic">إجمالي الاستحقاق</span>
                        <h4 id="modalTotalVal" class="text-4xl font-black tracking-tighter">0</h4>
                    </div>
                    <div>
                        <span class="text-[10px] font-black text-slate-400 block uppercase italic">العجز / الزيادة</span>
                        <h4 id="modalDiffVal" class="text-4xl font-black tracking-tighter">0</h4>
                    </div>
                </div>
                <button id="modalPrintBtn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-lg hover:bg-blue-500 shadow-xl active:scale-95 transition-all">طبع الريسيت الحالي 🖨️</button>
            </div>
        </div>
    </div>

    <!-- Bulk Actions Floating Bar -->
    <div id="bulkActions" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white p-5 rounded-[3rem] shadow-2xl flex items-center gap-10 z-50 border border-white/20">
        <span id="selectedCount" class="text-sm font-black text-blue-400 italic">0 سجلات مختارة للدمج</span>
        <button onclick="generateDailyReport()" class="bg-blue-600 px-12 py-3.5 rounded-3xl text-xs font-black hover:bg-blue-500 shadow-lg active:scale-95 transition-all">🖨️ طباعة مدمجة احترافية</button>
    </div>

    <!-- Printing Area (Hidden) -->
    <div id="thermalArea"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logoUrl = "https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0";

    let allRecords = [];
    let currentUser = null;

    window.onload = () => {
        const saved = sessionStorage.getItem('audit_auth_system_v9');
        if (saved) { currentUser = JSON.parse(saved); startApp(); }
        document.getElementById('loginForm').onsubmit = handleLogin;
    };

    async function handleLogin(e) {
        e.preventDefault();
        const code = document.getElementById('loginCode').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        
        try {
            const snap = await db.ref("branches").once("value");
            let found = null;
            snap.forEach(c => {
                const b = c.val();
                if(String(b.code).trim() === code && String(b.password).trim() === pass) {
                    found = { name: String(b.name).trim(), type: String(b.type || "فرع").trim() };
                }
            });
            if(found) { 
                currentUser = found; 
                sessionStorage.setItem('audit_auth_system_v9', JSON.stringify(found)); 
                startApp(); 
            } else { alert("بيانات الدخول خاطئة!"); }
        } catch(err) { alert("خطأ في الاتصال بالسيرفر"); }
    }

    function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        
        const bSel = document.getElementById('fBranch');
        if (currentUser.type === "مراجع") {
            bSel.disabled = false;
            document.getElementById('lockIcon').classList.add('hidden');
            document.getElementById('sysTitle').innerText = "الرقابة المالية المركزية";
        } else {
            bSel.innerHTML = `<option value="${currentUser.name}">${currentUser.name}</option>`;
            bSel.value = currentUser.name;
            bSel.disabled = true;
            document.getElementById('lockIcon').classList.remove('hidden');
            document.getElementById('sysTitle').innerText = `جرد فرع ${currentUser.name}`;
        }
        fetchData();
    }

    function logout() { sessionStorage.removeItem('audit_auth_system_v9'); location.reload(); }

    function sum(arr) { 
        if(!arr || !Array.isArray(arr)) return 0; 
        return arr.reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0); 
    }

    function fetchData() {
        const body = document.getElementById("mainTableBody");
        body.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-300 font-bold italic animate-pulse">جاري سحب البيانات...</td></tr>`;

        db.ref("treasury").once("value", s => {
            allRecords = [];
            const bSet = new Set();
            s.forEach(c => {
                const item = c.val(); item.key = c.key;
                const bName = (item.branchName || "").trim();
                if (currentUser.type === "مراجع") {
                    allRecords.push(item);
                    if(bName) bSet.add(bName);
                } else {
                    if (bName === currentUser.name) allRecords.push(item);
                }
            });

            if (currentUser.type === "مراجع") {
                const sel = document.getElementById("fBranch");
                const current = sel.value;
                sel.innerHTML = `<option value="">كل الفروع</option>`;
                Array.from(bSet).sort().forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
                sel.value = current;
            }
            applyFilters();
        });
    }

    function applyFilters() {
        const bV = document.getElementById("fBranch").value;
        const dV = document.getElementById("fDate").value;
        const drV = document.getElementById("fDrawer").value;

        const filtered = allRecords.filter(r => {
            const rN = (r.branchName || "").trim();
            if (currentUser.type !== "مراجع" && rN !== currentUser.name) return false;
            if (bV && rN !== bV) return false;
            if (dV && r.date !== dV) return false;
            if (drV && r.drawer != drV) return false;
            return true;
        });
        renderTable(filtered);
    }

    function renderTable(data) {
        const body = document.getElementById("mainTableBody");
        body.innerHTML = "";
        data.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

        let s = { c:0, cc:0, i:0, ic:0, v:0, vc:0, w:0, wc:0 };
        data.forEach(item => {
            s.c += (+item.cash||0); s.cc++;
            s.i += sum(item.insta); s.ic += (item.insta ? item.insta.length : 0);
            s.v += sum(item.visa); s.vc += (item.visa ? item.visa.length : 0);
            s.w += sum(item.wallet); s.wc += (item.wallet ? item.wallet.length : 0);

            const tr = document.createElement("tr");
            tr.className = "hover:bg-blue-50/50 transition-all cursor-pointer group";
            tr.onclick = (e) => { if(e.target.type !== 'checkbox' && e.target.tagName !== 'BUTTON') showDetailsModal(item); };
            tr.innerHTML = `
                <td class="p-6 text-center"><input type="checkbox" value="${item.key}" onchange="updateSelectedCount()" class="row-check checkbox-custom"></td>
                <td class="p-6 font-black text-slate-800">${item.branchName}</td>
                <td class="p-6 text-slate-400 font-bold text-[11px] italic">${item.date}</td>
                <td class="p-6 text-center">${item.drawer || '1'}</td>
                <td class="p-6 text-emerald-600 font-black">${(+item.cash||0).toLocaleString()}</td>
                <td class="p-6 font-black">${(+item.total||0).toLocaleString()}</td>
                <td class="p-6 text-center">
                    <span class="px-3 py-1 rounded-lg text-[10px] font-black italic ${+item.diff < 0 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                        ${item.diff}
                    </span>
                </td>
                <td class="p-6 text-center"><button onclick='printSingle(${JSON.stringify(item)})' class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black hover:bg-blue-600 transition-all shadow-md">طبع 🖨️</button></td>
            `;
            body.appendChild(tr);
        });

        document.getElementById("stCash").innerText = s.c.toLocaleString();
        document.getElementById("stCashCount").innerText = `${s.cc} جرد`;
        document.getElementById("stInsta").innerText = s.i.toLocaleString();
        document.getElementById("stInstaCount").innerText = `${s.ic} ع`;
        document.getElementById("stVisa").innerText = s.v.toLocaleString();
        document.getElementById("stVisaCount").innerText = `${s.vc} ع`;
        document.getElementById("stWallet").innerText = s.w.toLocaleString();
        document.getElementById("stWalletCount").innerText = `${s.wc} ع`;
    }

function showDetailsModal(item) {
        const modal = document.getElementById("detailsModal");
        const body = document.getElementById("modalBody");
        document.getElementById("modalSubTitle").innerText = `${item.branchName} | درج ${item.drawer} | بتاريخ ${item.date}`;
        
        body.innerHTML = `
            ${renderSubTableHTML("انستا باي", item.insta, 'trans')}
            ${renderSubTableHTML("المحافظ", item.wallet, 'trans')}
            ${renderSubTableHTML("الفيزا", item.visa, 'visa')}
            ${renderSubTableHTML("المشتريات", item.purchases, 'exp')}
            ${renderSubTableHTML("المصروفات", item.expenses, 'exp')}
            <div class="bg-blue-50/50 p-6 rounded-[2rem] flex flex-col justify-center items-center border border-blue-100">
                <span class="text-[9px] font-black text-blue-400 uppercase italic">الكاش الصافي</span>
                <h4 class="text-3xl font-black text-blue-900 mt-2">${(+item.cash||0).toLocaleString()}</h4>
            </div>
        `;

        document.getElementById("modalTotalVal").innerText = (+item.total||0).toLocaleString();
        const diffEl = document.getElementById("modalDiffVal");
        diffEl.innerText = item.diff;
        diffEl.className = `text-3xl font-black ${+item.diff < 0 ? 'text-red-500' : 'text-green-500'}`;

        document.getElementById("modalPrintBtn").onclick = () => printSingle(item);
        modal.style.display = "flex";
        document.body.style.overflow = "hidden";
    }

    function closeDetails() {
        document.getElementById("detailsModal").style.display = "none";
        document.body.style.overflow = "auto";
    }

    function renderSubTableHTML(title, arr, type) {
        if(!arr || arr.length === 0) return `<div class="bg-slate-50 p-6 rounded-[2rem] text-center text-slate-300 font-bold border-2 border-dashed border-slate-100 text-[10px] italic">${title}: لا يوجد</div>`;
        let h = `<div class="bg-white border rounded-[2rem] overflow-hidden shadow-sm">
            <div class="bg-slate-900 text-white p-2.5 text-[10px] font-black text-center italic uppercase">${title}</div>
            <table class="w-full text-[11px] text-right italic"><tbody>`;
        arr.forEach(x => {
            h += `<tr class="border-b">`;
            if(type==='visa') h += `<td class="p-2 text-slate-400 font-bold">${x.batch}</td><td class="p-2 font-black">${x.amount}</td><td class="p-2 text-blue-600 font-black">x${x.count}</td>`;
            else if(type==='trans') h += `<td class="p-2 text-emerald-600 font-black">${x.amount}</td><td class="p-2 text-slate-400 text-[9px] font-bold">${x.mobile||''}</td><td class="p-2 font-black">${x.name||''}</td>`;
            else h += `<td class="p-2 text-red-500 font-black">${x.amount}</td><td class="p-2 text-slate-500 font-bold">${x.note||''}</td>`;
            h += `</tr>`;
        });
        h += `<tr class="bg-slate-50 font-black text-blue-600"><td class="p-3 text-[10px]">المجموع</td><td colspan="2" class="p-3 text-left tracking-tight">${sum(arr).toLocaleString()}</td></tr>`;
        h += `</tbody></table></div>`;
        return h;
    }

    function toggleSelectAll(m) { document.querySelectorAll(".row-check").forEach(c => c.checked = m.checked); updateSelectedCount(); }
    
    function updateSelectedCount() {
        const count = document.querySelectorAll(".row-check:checked").length;
        const bulk = document.getElementById("bulkActions");
        if(count > 0) bulk.classList.remove("hidden"); else bulk.classList.add("hidden");
        document.getElementById("selectedCount").innerText = `${count} سجلات مختارة للدمج`;
    }

    // محرك الدمج الذكي للبيانات الذكية
    function smartMerge(dataArr, type) {
        if (!dataArr || dataArr.length === 0) return [];
        const mergedMap = new Map();

        dataArr.forEach(item => {
            let key;
            if (type === 'visa') key = item.batch;
            else if (type === 'trans') key = item.mobile || item.name;
            else if (type === 'exp') key = item.note;

            if (mergedMap.has(key)) {
                const existing = mergedMap.get(key);
                existing.amount = (parseFloat(existing.amount) || 0) + (parseFloat(item.amount) || 0);
                if (type === 'visa') {
                    existing.count = (parseInt(existing.count) || 0) + (parseInt(item.count) || 0);
                }
            } else {
                mergedMap.set(key, { ...item });
            }
        });
        return Array.from(mergedMap.values());
    }

    function generateDailyReport() {
        const keys = Array.from(document.querySelectorAll(".row-check:checked")).map(c => c.value);
        const selected = allRecords.filter(r => keys.includes(r.key));
        if(!selected.length) return;

        let agg = { 
            cash:0, actual:0, total:0, diff:0, 
            insta:[], wallet:[], visa:[], purchases:[], expenses:[], 
            bNames: new Set(), date: selected[0].date, day: selected[0].day 
        };

        selected.forEach(d => {
            agg.cash += (+d.cash||0); agg.actual += (+d.actual||0); agg.total += (+d.total||0); agg.diff += (+d.diff||0);
            if(d.insta) agg.insta.push(...d.insta);
            if(d.wallet) agg.wallet.push(...d.wallet);
            if(d.visa) agg.visa.push(...d.visa);
            if(d.purchases) agg.purchases.push(...d.purchases);
            if(d.expenses) agg.expenses.push(...d.expenses);
            agg.bNames.add(d.branchName);
        });

        // تنفيذ الدمج الذكي قبل الطباعة
        agg.insta = smartMerge(agg.insta, 'trans');
        agg.wallet = smartMerge(agg.wallet, 'trans');
        agg.visa = smartMerge(agg.visa, 'visa');
        agg.purchases = smartMerge(agg.purchases, 'exp');
        agg.expenses = smartMerge(agg.expenses, 'exp');

        printThermalFinal(agg, true);
    }

    function printSingle(d) { printThermalFinal(d, false); }

    function printThermalFinal(d, isAgg) {
        const area = document.getElementById("thermalArea");
        const bTitle = isAgg ? Array.from(d.bNames).join(" + ") : d.branchName;
        
        area.innerHTML = `
            <div class="print-header">
                <img src="${logoUrl}" class="header-logo-img">
                <div style="text-align:right; flex:1;">
                    <h2 style="font-size:15px; font-weight:900; margin:0; line-height:1.2;">${bTitle}</h2>
                    <div style="font-size:10px; font-weight:bold;">تقرير ${isAgg ? 'دمج مالي مجمع' : 'تسليم عهده'}</div>
                </div>
            </div>

            <table class="receipt-table" style="margin-bottom:8px; border:none;">
                <tr style="border:none;">
                    <td style="border:1.5px solid #000;">${d.day || '---'}</td>
                    <td style="border:1.5px solid #000;">${d.date}</td>
                    <td style="border:1.5px solid #000;">${isAgg ? 'مجمع' : 'درج '+(d.drawer||'1')}</td>
                </tr>
            </table>

            <table class="receipt-table" style="font-size:13px;">
                <tr style="background:#eee"><th>البيان</th><th>القيمة</th></tr>
                <tr><td>كاش الخزينة</td><td>${(+d.cash||0).toLocaleString()}</td></tr>
                <tr><td>تجميع انستا</td><td>${sum(d.insta).toLocaleString()}</td></tr>
                <tr><td>تجميع محافظ</td><td>${sum(d.wallet).toLocaleString()}</td></tr>
                <tr><td>تجميع فيزا</td><td>${sum(d.visa).toLocaleString()}</td></tr>
                <tr style="background:#f9f9f9; font-weight:900;"><td>إجمالي الحساب</td><td>${(+d.total||0).toLocaleString()}</td></tr>
                <tr style="background:#f0f0f0; font-size:16px; font-weight:900;"><td>مبلغ POS</td><td>${(+d.actual||0).toLocaleString()}</td></tr>
                <tr style="color:${+d.diff < 0 ? 'red' : 'green'}; font-size:16px;"><td>العجز/الزيادة</td><td>${d.diff}</td></tr>
            </table>

            ${renderSubTablePrint("تفاصيل دمج انستا باي", d.insta, 'trans')}
            ${renderSubTablePrint("تفاصيل دمج المحافظ", d.wallet, 'trans')}
            ${renderSubTablePrint("تجميع المشتريات", d.purchases, 'exp')}
            ${renderSubTablePrint("تجميع المصروفات", d.expenses, 'exp')}
            ${renderSubTablePrint("دمج الباتشات (فيزا)", d.visa, 'visa')}

            <div style="display:flex; justify-content:space-between; margin-top:20px; border-top:1.5px solid #000; padding-top:10px; font-size:10px; font-weight:bold;">
                <div>المسؤول: ${d.drawerManager || '_______'}</div>
                <div>المراجع: ${currentUser.name}</div>
            </div>
            
            <div style="text-align:center; font-size:9px; margin-top:12px; border-top:1px dashed #ccc; padding-top:4px; font-style:italic;">
                ${isAgg ? 'تم دمج البيانات ذكياً بواسطة النظام' : 'نظام الرقابة الموحد'} - ${new Date().toLocaleString('ar-EG')}
            </div>
        `;
        setTimeout(() => window.print(), 300);
    }

    function renderSubTablePrint(title, arr, type) {
        if(!arr || arr.length === 0) return "";
        let h = `<div style="text-align:center; font-weight:900; margin-top:10px; border-top:1.5px solid #000; padding-top:2px; font-size:10px;">-- ${title} --</div>`;
        h += `<table class="receipt-table"><thead><tr>`;
        if(type==='visa') h += `<th>باتش</th><th>قيمة</th><th>ع</th>`;
        else if(type==='trans') h += `<th>مبلغ</th><th>الرقم</th><th>الاسم</th>`;
        else h += `<th>مبلغ</th><th>البيان</th><th>بواسطة</th>`;
        h += `</tr></thead><tbody>`;
        arr.forEach(x => {
            h += `<tr>`;
            if(type==='visa') h += `<td>${x.batch}</td><td>${x.amount.toLocaleString()}</td><td>${x.count}</td>`;
            else if(type==='trans') h += `<td>${x.amount.toLocaleString()}</td><td>${x.mobile||'-'}</td><td>${x.name||'-'}</td>`;
            else h += `<td>${x.amount.toLocaleString()}</td><td>${x.note||'-'}</td><td>${x.user||'-'}</td>`;
            h += `</tr>`;
        });
        h += `<tr style="background:#eee"><td>إجمالي</td><td colspan="2">${sum(arr).toLocaleString()}</td></tr>`;
        h += `</tbody></table>`;
        return h;
    }
</script>
